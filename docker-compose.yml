services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: system
      POSTGRES_PASSWORD: password
      POSTGRES_DB: system
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U system"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://system:password@db:5432/system
      FLASK_APP: app.py
      FLASK_ENV: development
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app
    command: python app.py

volumes:
  postgres_data:
